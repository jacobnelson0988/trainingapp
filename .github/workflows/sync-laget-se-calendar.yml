name: Sync laget.se calendar

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase sync
        env:
          LAGET_SE_SYNC_URL: ${{ secrets.LAGET_SE_SYNC_URL }}
          LAGET_SE_SYNC_CRON_SECRET: ${{ secrets.LAGET_SE_SYNC_CRON_SECRET }}
        run: |
          if [ -z "$LAGET_SE_SYNC_URL" ] || [ -z "$LAGET_SE_SYNC_CRON_SECRET" ]; then
            echo "Missing required secrets: LAGET_SE_SYNC_URL and/or LAGET_SE_SYNC_CRON_SECRET"
            exit 1
          fi

          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $LAGET_SE_SYNC_CRON_SECRET" \
            --data '{"force":false}' \
            "$LAGET_SE_SYNC_URL"
