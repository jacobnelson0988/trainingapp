# Supabase CLI-konfiguration
# Länka till rätt projekt med:
#   supabase link --project-ref <project-ref>
#
# Staging:    supabase link --project-ref <STAGING_PROJECT_REF>
# Produktion: supabase link --project-ref <PROD_PROJECT_REF>
#
# Project Reference hittas i Supabase Dashboard:
#   → Project Settings → General → Reference ID

[functions.create-player]
verify_jwt = false
enabled = true
entrypoint = "./functions/create-player/index.ts"
import_map = "./functions/create-player/deno.json"

[functions.archive-player]
verify_jwt = false
enabled = true
entrypoint = "./functions/archive-player/index.ts"

[functions.delete-player]
verify_jwt = false
enabled = true
entrypoint = "./functions/delete-player/index.ts"

